server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Проксируем API-запросы на backend-контейнер
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA: любой путь отдаём index.html (React Router сам разберётся)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
