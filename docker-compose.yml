# Docker Compose для проекта «Битва Дашбордов» (Неделя 4).
# Два сервиса: PostgreSQL (БД) и backend (Spring Boot). Запуск: docker compose up -d

services:
  # Контейнер с СУБД. Данные сохраняются в volume postgres_data.
  postgres:
    image: postgres:15
    container_name: dashboard-battle-postgres
    environment:
      POSTGRES_DB: dashboard_battle
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dashboard_battle"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Контейнер с приложением. Собирается из backend/Dockerfile. Подключается к postgres по имени сервиса.
  # Внешний порт не публикуем: backend доступен внутри docker-сети как http://backend:8080
  # (frontend/nginx.conf проксирует /api именно туда). Это исключает конфликты портов в Coolify.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dashboard-battle-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dashboard_battle
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_PROFILES_ACTIVE: demo-postgres
      MOYSKLAD_REAL_ENABLED: ${MOYSKLAD_REAL_ENABLED:-false}
      MOYSKLAD_TOKEN: ${MOYSKLAD_TOKEN:-}
      TELEGRAM_REAL_ENABLED: ${TELEGRAM_REAL_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      ALLOW_DEBUG_HEADERS: ${ALLOW_DEBUG_HEADERS:-false}
      JWT_SECRET: ${JWT_SECRET:-dashboard-battle-jwt-secret-32chars!!}
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_ENABLE_DANGER_ZONE: ${VITE_ENABLE_DANGER_ZONE:-false}
    container_name: dashboard-battle-frontend
    depends_on:
      - backend
    ports:
      - "3001:80"

volumes:
  postgres_data:
